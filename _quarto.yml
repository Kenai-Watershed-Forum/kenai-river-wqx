project:
  type: book
  output-dir: docs

book:
  title: "kenai-river-wqx-report-v2"
  author: "Kenai Watershed Forum"
  date: "1/4/2023"
  chapters:
    - index.qmd
    - acknowledgements.qmd
    - abstract.qmd
    - units.qmd
    - acronyms.qmd
    - intro.qmd
    - study_area.qmd
    - summary.qmd
    - references.qmd
  appendices:
    - appendix_a.qmd

  repo-url: https://github.com/Kenai-Watershed-Forum/kenai-river-wqx-report-v2.git
  search:
    location: sidebar
    type: textbox
  downloads: [docx]

bibliography: references.bib

format:
  html:
    theme: cosmo
  #pdf:
  #  documentclass: scrreprt
  docx:
    toc: true
    toc-depth: 2
    toc-title: Table of contents
    number-sections: true
    highlight-style: github

editor: visual

