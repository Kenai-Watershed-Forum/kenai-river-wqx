project:
  type: book
  output-dir: docs
  execute-dir: project

profile:
  default: html
  group:
    - [html, docx]

book:
  title: "Water Quality Assessment of the Kenai River Watershed from 2000 to 2025 [DRAFT]"
  author: "Benjamin Meyer, Kenai Watershed Forum"
  page-navigation: true
  chapters:
    - index.qmd
    - chapters/acknowledgements.qmd
    - chapters/abstract.qmd
    - chapters/units.qmd
    - chapters/acronyms.qmd
    - part: "Introduction & Methods"
      chapters:
      - chapters/intro.qmd
      - chapters/study_area.qmd
      - chapters/methods.qmd
    - part: "Data"
      chapters:
      - chapters/data_sourcing.qmd
      - chapters/data_qa_qc.qmd
      - chapters/interpreting_boxplots.qmd
      - chapters/reg_limits.qmd
    - part: "Results"
      chapters:
      - parameters/arsenic.qmd
      - parameters/cadmium.qmd
      - parameters/chromium.qmd
      - parameters/copper.qmd
      - parameters/lead.qmd
      - parameters/zinc.qmd
      - parameters/calcium.qmd
      - parameters/iron.qmd
      - parameters/magnesium.qmd
      - parameters/nitrate.qmd
      - parameters/phosphorus.qmd
      # parameters/diesel_range_organics.qmd
      #- parameters/gas_range_organics.qmd
      #- parameters/residual_range_organics.qmd
      - parameters/btex.qmd
      #- parameters/benzene.qmd
      - parameters/fecal_coliform.qmd
      - parameters/pH.qmd
      - parameters/specific_conductance.qmd
      - parameters/tss.qmd
      - parameters/turbidity.qmd
      - parameters/water_temp.qmd
      - parameters/summary.qmd
      - parameters/references.qmd
  appendices:
    - chapters/appendix_a.qmd
    - chapters/cdx_upload.qmd
    - chapters/appendix_b.qmd
    - chapters/finance_history.qmd
    

  repo-url: https://github.com/Kenai-Watershed-Forum/kenai-river-wqx
  search:
    location: sidebar
    type: textbox
  downloads: [docx]

bibliography: references.bib

